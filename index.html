<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulasi BEP — Rantai Pasok Biomassa IKN</title>

  <!-- importmap: tells the browser where to find ES module packages -->
  <script type="importmap">
  {
    "imports": {
      "react":          "https://esm.sh/react@18.2.0",
      "react-dom":      "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "recharts":       "https://esm.sh/recharts@2.8.0"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body  { background: #080f1e; color: #e2e8f0; font-family: 'Syne', sans-serif; }
    ::-webkit-scrollbar        { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track  { background: #0f172a; }
    ::-webkit-scrollbar-thumb  { background: #334155; border-radius: 3px; }
    .fade { animation: fade .35s ease-out both; }
    @keyframes fade { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    button { cursor: pointer; }
    table  { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #1e293b; }
  </style>
</head>
<body>
<div id="root"></div>

<!-- type="module" is deferred by default — runs AFTER importmap is parsed -->
<script type="module">
import React, { useState, useEffect } from 'react';
import { createRoot } from 'react-dom/client';
import {
  LineChart, Line, AreaChart, Area, BarChart, Bar,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ReferenceLine, ResponsiveContainer
} from 'recharts';

const h = React.createElement;

// ── DATA ─────────────────────────────────────────────────────────────────
const GWH   = 240000;   // MWh / tahun
const PPA   = 1450;     // Rp / kWh
const REV   = GWH * PPA / 1000; // Rp juta / tahun = 348.000

const SC = [
  { id:'S0', label:'S0 — Bulk Baseline',     c:'#ef4444', capex:0,     plant:390000, opex:312000, loss:.30, viable:false, payback:null, irr:null,  kwh:4750, note:'Tidak layak — biaya produksi > pendapatan PPA' },
  { id:'S1', label:'S1 — Centralized Hub',   c:'#f59e0b', capex:15000, plant:390000, opex:244000, loss:.05, viable:true,  payback:13,   irr:13,    kwh:1850, note:'Layak — 1 hub pelleting terpusat dekat IKN' },
  { id:'S2', label:'S2 — Decentralized Hub', c:'#3b82f6', capex:12000, plant:390000, opex:256000, loss:.08, viable:true,  payback:15,   irr:11,    kwh:2050, note:'Layak — 3 hub terdesentralisasi, semi-kering' },
  { id:'S3', label:'S3 — Hybrid Optimal',    c:'#10b981', capex:45000, plant:390000, opex:235000, loss:.04, viable:true,  payback:11,   irr:16,    kwh:1620, note:'Sangat layak — sistem terintegrasi, efisiensi tertinggi' },
];

function bepRows(s, n=25) {
  const cap = s.capex + s.plant;
  let cc = cap, cr = 0;
  const rows = [{ yr:0, cc:r1(cap/1e3), cr:0, ar:0, ac:r1(cap/1e3), cf:r1(-cap/1e3), ccf:r1(-cap/1e3) }];
  for (let y=1;y<=n;y++) {
    cc += s.opex; cr += REV;
    rows.push({ yr:y, cc:r1(cc/1e3), cr:r1(cr/1e3),
      ar:r1(REV/1e3), ac:r1(s.opex/1e3),
      cf:r1((REV-s.opex)/1e3), ccf:r1((cr-cc)/1e3) });
  }
  return rows;
}
const r1 = v => +v.toFixed(1);

function cmpData() {
  return Array.from({length:26},(_,y) => {
    const o={yr:y};
    SC.forEach(s=>{ const cap=s.capex+s.plant;
      o[s.id]= y===0 ? r1(-cap/1e3) : r1((REV*y - cap - s.opex*y)/1e3); });
    return o;
  });
}

const fmt = v => v != null ? 'Rp '+v.toLocaleString('id-ID')+' M' : '—';
const idr = v => v != null ? v.toLocaleString('id-ID') : '—';

// ── STYLES ────────────────────────────────────────────────────────────────
const S = {
  card: { background:'#0b1120', border:'1px solid #1e293b', borderRadius:12, padding:'20px 24px' },
  mono: { fontFamily:"'IBM Plex Mono',monospace" },
  label: { fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:'#475569', letterSpacing:2, textTransform:'uppercase', marginBottom:16 },
  tip: { background:'#0f172a', border:'1px solid #33415588', borderRadius:8, padding:'12px 16px',
         fontFamily:"'IBM Plex Mono',monospace", fontSize:12 },
  tickStyle: { fill:'#64748b', fontSize:11 },
};

// ── TOOLTIP ───────────────────────────────────────────────────────────────
function Tip({ active, payload, label, sc }) {
  if (!active || !payload?.length) return null;
  return h('div', { style:{ ...S.tip, border:`1px solid ${sc.c}55` } },
    h('p', { style:{ color:sc.c, fontWeight:700, marginBottom:6 } }, `Tahun ke-${label}`),
    ...payload.map(p => h('p', { key:p.dataKey, style:{ color:p.color, margin:'2px 0' } },
      p.name+': ', h('span', { style:{ color:'#fff' } }, fmt(p.value))
    ))
  );
}

// ── CARD ──────────────────────────────────────────────────────────────────
function Card({ title, children, mb=20 }) {
  return h('div', { style:{ ...S.card, marginBottom:mb } },
    title && h('div', { style:S.label }, title),
    children
  );
}

// ── METRIC ────────────────────────────────────────────────────────────────
function Metric({ icon, label, value, sub, c }) {
  return h('div', { style:{ background:'#0f172a', border:`1px solid ${c}33`,
    borderRadius:10, padding:'14px 18px', flex:1, minWidth:120, position:'relative', overflow:'hidden' } },
    h('div', { style:{ position:'absolute', top:0, left:0, right:0, height:2,
      background:`linear-gradient(90deg,${c},transparent)` } }),
    h('div', { style:{ fontSize:18, marginBottom:4 } }, icon),
    h('div', { style:{ ...S.mono, fontSize:10, color:'#94a3b8', letterSpacing:1, textTransform:'uppercase' } }, label),
    h('div', { style:{ ...S.mono, fontSize:16, fontWeight:700, color:c, margin:'4px 0 2px' } }, value),
    sub && h('div', { style:{ fontSize:10, color:'#64748b' } }, sub)
  );
}

// ── INDIVIDUAL TAB ────────────────────────────────────────────────────────
function TabInd({ sc }) {
  const rows = bepRows(sc);
  const bep  = sc.viable ? rows.find(r => r.ccf >= 0)?.yr : null;
  const gid  = 'g'+sc.id;
  const tip  = p => h(Tip, { ...p, sc });

  return h('div', { className:'fade' },
    h('div', { style:{ display:'flex', justifyContent:'space-between', flexWrap:'wrap',
      gap:10, marginBottom:20 } },
      h('div', null,
        h('h2', { style:{ fontSize:18, fontWeight:700, color:sc.c } }, sc.label),
        h('p',  { style:{ color:'#64748b', fontSize:12, marginTop:4 } }, sc.note)
      ),
      !sc.viable && h('div', { style:{ background:'#450a0a', border:'1px solid #ef444466',
        borderRadius:8, padding:'8px 14px', ...S.mono, fontSize:11, color:'#fca5a5' } },
        '⚠ TIDAK LAYAK — Biaya produksi > tarif PPA')
    ),

    h(Card, { title:'Pendapatan Kumulatif vs Biaya Kumulatif (Rp Miliar)' },
      h(ResponsiveContainer, { width:'100%', height:300 },
        h(LineChart, { data:rows, margin:{ top:10, right:30, left:10, bottom:10 } },
          h(CartesianGrid, { strokeDasharray:'3 3', stroke:'#1e293b' }),
          h(XAxis, { dataKey:'yr', stroke:'#334155', tick:S.tickStyle,
            label:{ value:'Tahun Operasi', position:'insideBottom', offset:-4, fill:'#475569', fontSize:11 } }),
          h(YAxis, { stroke:'#334155', tick:S.tickStyle, tickFormatter:v=>idr(v)+'M' }),
          h(Tooltip, { content:tip }),
          h(Legend, { wrapperStyle:{ ...S.mono, fontSize:12, color:'#94a3b8', paddingTop:12 } }),
          bep != null && h(ReferenceLine, { x:bep, stroke:sc.c, strokeDasharray:'6 3', strokeWidth:1.5,
            label:{ value:'BEP Th.'+bep, position:'top', fill:sc.c, fontSize:11 } }),
          h(ReferenceLine, { y:0, stroke:'#334155' }),
          h(Line, { name:'Pendapatan Kumulatif', dataKey:'cr', stroke:'#10b981',
            strokeWidth:2.5, dot:false, activeDot:{ r:5 } }),
          h(Line, { name:'Biaya Kumulatif', dataKey:'cc', stroke:sc.c,
            strokeWidth:2.5, dot:false, strokeDasharray: sc.id==='S0'?'8 4':'0', activeDot:{ r:5 } })
        )
      )
    ),

    h(Card, { title:'Arus Kas Kumulatif Bersih (Rp Miliar)', mb:0 },
      h(ResponsiveContainer, { width:'100%', height:220 },
        h(AreaChart, { data:rows, margin:{ top:10, right:30, left:10, bottom:10 } },
          h('defs', null,
            h('linearGradient', { id:gid, x1:'0', y1:'0', x2:'0', y2:'1' },
              h('stop', { offset:'5%',  stopColor:sc.c, stopOpacity:0.3 }),
              h('stop', { offset:'95%', stopColor:sc.c, stopOpacity:0 })
            )
          ),
          h(CartesianGrid, { strokeDasharray:'3 3', stroke:'#1e293b' }),
          h(XAxis, { dataKey:'yr', stroke:'#334155', tick:S.tickStyle }),
          h(YAxis, { stroke:'#334155', tick:S.tickStyle, tickFormatter:v=>idr(v)+'M' }),
          h(Tooltip, { content:tip }),
          h(ReferenceLine, { y:0, stroke:'#ef444488', strokeWidth:1.5, strokeDasharray:'4 2' }),
          bep != null && h(ReferenceLine, { x:bep, stroke:sc.c, strokeDasharray:'6 3', strokeWidth:1.5 }),
          h(Area, { name:'Cashflow Kumulatif', dataKey:'ccf', stroke:sc.c,
            strokeWidth:2, fill:`url(#${gid})` })
        )
      )
    )
  );
}

// ── COMPARE TAB ───────────────────────────────────────────────────────────
function TabCmp() {
  const data = cmpData();
  return h('div', { className:'fade' },
    h('h2', { style:{ fontSize:18, fontWeight:700, marginBottom:6, color:'#f1f5f9' } },
      'Perbandingan Cashflow Kumulatif — 4 Skenario'),
    h('p', { style:{ ...S.mono, color:'#64748b', fontSize:12, marginBottom:20 } },
      'Di atas nol = kumulatif untung · Crossing nol = Break-Even Point'),

    h(Card, { title:'Cashflow Kumulatif Semua Skenario (Rp Miliar)' },
      h(ResponsiveContainer, { width:'100%', height:360 },
        h(LineChart, { data, margin:{ top:10, right:30, left:10, bottom:20 } },
          h(CartesianGrid, { strokeDasharray:'3 3', stroke:'#1e293b' }),
          h(XAxis, { dataKey:'yr', stroke:'#334155', tick:S.tickStyle,
            label:{ value:'Tahun Operasi', position:'insideBottom', offset:-8, fill:'#475569', fontSize:11 } }),
          h(YAxis, { stroke:'#334155', tick:S.tickStyle, tickFormatter:v=>idr(v)+'M' }),
          h(Tooltip, { formatter:(v,n)=>[fmt(v),n],
            contentStyle:{ ...S.tip }, labelStyle:{ color:'#94a3b8' } }),
          h(Legend, { wrapperStyle:{ ...S.mono, fontSize:11, color:'#94a3b8', paddingTop:12 } }),
          h(ReferenceLine, { y:0, stroke:'#475569', strokeWidth:1.5, strokeDasharray:'5 3' }),
          ...SC.map(s => h(Line, { key:s.id, name:s.label, dataKey:s.id,
            stroke:s.c, strokeWidth:s.id==='S3'?3:2, dot:false,
            strokeDasharray:s.id==='S0'?'8 4':'0', activeDot:{ r:4 } }))
        )
      )
    ),

    h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))', gap:12 } },
      ...SC.map(s => {
        const rows = bepRows(s);
        const bep  = rows.find(r => r.ccf >= 0)?.yr;
        const cf25 = rows[25]?.ccf;
        return h('div', { key:s.id, style:{ background:'#0b1120', borderRadius:10, padding:16,
          border:`1px solid ${s.c}33`, borderTop:`3px solid ${s.c}` } },
          h('div', { style:{ ...S.mono, fontSize:11, color:s.c, fontWeight:700, marginBottom:10 } }, s.label),
          ...[['BEP', bep!=null?'Tahun '+bep:'Tidak tercapai'],
              ['CF Th.25', cf25!=null?'Rp '+cf25.toLocaleString('id-ID')+' M':'—'],
              ['IRR', s.irr?s.irr+'%':'Negatif'],
              ['Loss',(s.loss*100).toFixed(0)+'%']
          ].map(([k,v]) => h('div', { key:k, style:{ display:'flex', justifyContent:'space-between', marginBottom:4 } },
            h('span', { style:{ ...S.mono, fontSize:10, color:'#475569' } }, k),
            h('span', { style:{ ...S.mono, fontSize:10, fontWeight:700, color:s.viable?'#e2e8f0':'#ef4444' } }, v)
          ))
        );
      })
    )
  );
}

// ── ANNUAL TAB ────────────────────────────────────────────────────────────
function TabAnn({ sc }) {
  const rows = bepRows(sc);
  return h('div', { className:'fade' },
    h('h2', { style:{ fontSize:18, fontWeight:700, marginBottom:6, color:sc.c } }, sc.label),
    h('p', { style:{ ...S.mono, color:'#64748b', fontSize:12, marginBottom:20 } },
      'Pendapatan PPA vs OPEX tahunan'),

    h(Card, { title:'Pendapatan vs Biaya Operasional per Tahun (Rp Miliar)' },
      h(ResponsiveContainer, { width:'100%', height:300 },
        h(BarChart, { data:rows.slice(1), margin:{ top:10, right:30, left:10, bottom:20 } },
          h(CartesianGrid, { strokeDasharray:'3 3', stroke:'#1e293b', vertical:false }),
          h(XAxis, { dataKey:'yr', stroke:'#334155', tick:S.tickStyle,
            label:{ value:'Tahun Operasi', position:'insideBottom', offset:-8, fill:'#475569', fontSize:11 } }),
          h(YAxis, { stroke:'#334155', tick:S.tickStyle, tickFormatter:v=>v+'M' }),
          h(Tooltip, { contentStyle:S.tip, formatter:(v,n)=>[fmt(v),n], labelStyle:{ color:'#94a3b8' } }),
          h(Legend, { wrapperStyle:{ ...S.mono, fontSize:11, color:'#94a3b8', paddingTop:12 } }),
          h(Bar, { name:'Pendapatan Tahunan', dataKey:'ar', fill:'#10b98122',
            stroke:'#10b981', strokeWidth:1, radius:[3,3,0,0] }),
          h(Bar, { name:'Biaya Operasional',  dataKey:'ac', fill:sc.c+'22',
            stroke:sc.c, strokeWidth:1, radius:[3,3,0,0] })
        )
      )
    ),

    h(Card, { title:'Surplus / Defisit Tahunan (Rp Miliar)', mb:0 },
      h('div', { style:{ display:'flex', gap:8, flexWrap:'wrap' } },
        ...rows.slice(1).map(d => {
          const pos = d.cf >= 0;
          return h('div', { key:d.yr, style:{ background:pos?'#052e16':'#450a0a',
            border:`1px solid ${pos?'#10b98144':'#ef444444'}`,
            borderRadius:6, padding:'6px 10px', minWidth:62, textAlign:'center' } },
            h('div', { style:{ ...S.mono, fontSize:9, color:'#475569' } }, 'Th.'+d.yr),
            h('div', { style:{ ...S.mono, fontSize:10, fontWeight:700, color:pos?'#10b981':'#ef4444' } },
              (pos?'+':'')+idr(d.cf)+'M')
          );
        })
      )
    )
  );
}

// ── SENSITIVITY TAB ───────────────────────────────────────────────────────
function TabSens() {
  const PPA_R = [1100,1200,1300,1350,1450,1550,1650,1800,1900];
  const viable = SC.filter(s => s.viable);
  const sens = PPA_R.map(ppa => {
    const o = { ppa };
    viable.forEach(s => {
      const rev = GWH * ppa / 1000, cap = s.capex + s.plant;
      o[s.id] = rev > s.opex ? Math.min(Math.ceil(cap/(rev-s.opex)), 26) : 27;
    });
    return o;
  });

  const getBEP = (s, ppa) => {
    const rev = GWH * ppa / 1000, cap = s.capex + s.plant;
    const y = rev > s.opex ? Math.ceil(cap/(rev-s.opex)) : null;
    return y && y <= 25 ? y : null;
  };

  return h('div', { className:'fade' },
    h('h2', { style:{ fontSize:18, fontWeight:700, marginBottom:6, color:'#f1f5f9' } },
      'Sensitivitas BEP terhadap Harga PPA'),
    h('p', { style:{ ...S.mono, color:'#64748b', fontSize:12, marginBottom:20 } },
      'Variasi Rp 1.100–1.900/kWh · Garis merah = baseline Rp 1.450/kWh'),

    h(Card, { title:'BEP Tahun ke-N berdasarkan Harga PPA' },
      h(ResponsiveContainer, { width:'100%', height:300 },
        h(LineChart, { data:sens, margin:{ top:10, right:30, left:10, bottom:20 } },
          h(CartesianGrid, { strokeDasharray:'3 3', stroke:'#1e293b' }),
          h(XAxis, { dataKey:'ppa', stroke:'#334155', tick:S.tickStyle,
            tickFormatter:v=>'Rp '+v,
            label:{ value:'Harga PPA (Rp/kWh)', position:'insideBottom', offset:-8, fill:'#475569', fontSize:11 } }),
          h(YAxis, { stroke:'#334155', tick:S.tickStyle, domain:[0,28],
            tickFormatter:v=>v>25?'>25':v }),
          h(Tooltip, { contentStyle:S.tip,
            formatter:v=>[v>25?'Tidak tercapai':'Tahun '+v,''],
            labelFormatter:v=>'PPA: Rp '+v+'/kWh', labelStyle:{ color:'#94a3b8' } }),
          h(Legend, { wrapperStyle:{ ...S.mono, fontSize:11, color:'#94a3b8', paddingTop:12 } }),
          h(ReferenceLine, { x:1450, stroke:'#ef4444', strokeDasharray:'6 3', strokeWidth:1.5,
            label:{ value:'Baseline', position:'top', fill:'#ef4444', fontSize:10 } }),
          h(ReferenceLine, { y:25, stroke:'#334155', strokeDasharray:'4 2' }),
          ...viable.map(s => h(Line, { key:s.id, name:s.label, dataKey:s.id,
            stroke:s.c, strokeWidth:2.5, dot:{ r:3, fill:s.c } }))
        )
      )
    ),

    h('div', { style:{ ...S.card, overflow:'hidden', padding:0 } },
      h('table', null,
        h('thead', null, h('tr', { style:{ background:'#0d1f3c' } },
          h('th', { style:{ padding:'12px 16px', textAlign:'left', ...S.mono, fontSize:11, color:'#64748b', fontWeight:500 } }, 'PPA (Rp/kWh)'),
          ...viable.map(s => h('th', { key:s.id, style:{ padding:'12px 16px', textAlign:'center',
            ...S.mono, fontSize:11, color:s.c, fontWeight:700 } }, s.id))
        )),
        h('tbody', null,
          ...PPA_R.map((ppa,ri) => {
            const hl = ppa===1450;
            return h('tr', { key:ppa, style:{ background:hl?'#1e293b':ri%2===0?'#090f1b':'#0b1120',
              borderLeft:hl?'3px solid #ef4444':'3px solid transparent' } },
              h('td', { style:{ padding:'10px 16px', ...S.mono, fontSize:11,
                color:hl?'#ef4444':'#94a3b8', fontWeight:hl?700:400 } },
                'Rp '+ppa.toLocaleString('id-ID')+(hl?' ← baseline':'')),
              ...viable.map(s => {
                const y = getBEP(s, ppa);
                return h('td', { key:s.id, style:{ padding:'10px 16px', textAlign:'center',
                  ...S.mono, fontSize:11, color:y?s.c:'#475569', fontWeight:y?700:400 } },
                  y ? 'Th. '+y : '>25 th');
              })
            );
          })
        )
      )
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App() {
  const [sc,  setSc]  = useState(SC[3]);
  const [tab, setTab] = useState('individual');
  const [k,   setK]   = useState(0);
  useEffect(() => { setK(x => x+1); }, [sc]);

  const TABS = [
    { id:'individual',  label:'Analisis per Skenario' },
    { id:'compare',     label:'Perbandingan 4 Skenario' },
    { id:'annual',      label:'Arus Kas Tahunan' },
    { id:'sensitivity', label:'Sensitivitas PPA' },
  ];

  const bep = sc.viable ? bepRows(sc).find(r => r.ccf >= 0)?.yr : null;

  return h('div', { style:{ background:'#080f1e', minHeight:'100vh', paddingBottom:40 } },

    // HEADER
    h('div', { style:{ background:'linear-gradient(135deg,#0d1f3c,#0a1628 60%,#080f1e)',
      borderBottom:'1px solid #1e293b', padding:'28px 32px 22px' } },

      h('div', { style:{ display:'flex', justifyContent:'space-between',
        alignItems:'flex-start', flexWrap:'wrap', gap:16 } },
        h('div', null,
          h('div', { style:{ ...S.mono, fontSize:10, color:'#10b981',
            letterSpacing:3, textTransform:'uppercase', marginBottom:8 } },
            'Studi Kelayakan · Rantai Pasok Biomassa IKN'),
          h('h1', { style:{ fontSize:26, fontWeight:800, lineHeight:1.2, color:'#f1f5f9' } },
            'Simulasi Break-Even Point'),
          h('p', { style:{ ...S.mono, color:'#64748b', fontSize:13, marginTop:6 } },
            'PLTB 30 MW · 240 GWh/tahun · PPA Rp 1.450/kWh · Horizon 25 Tahun')
        ),
        h('div', { style:{ background:'#0f172a', border:'1px solid #1e3a5f',
          borderRadius:10, padding:'10px 18px', textAlign:'right' } },
          h('div', { style:{ ...S.mono, fontSize:9, color:'#475569', letterSpacing:2 } }, 'KAPASITAS'),
          h('div', { style:{ fontSize:22, fontWeight:800, color:'#10b981' } }, '30 MW'),
          h('div', { style:{ ...S.mono, fontSize:10, color:'#3b82f6' } }, 'IKN · Kalimantan Timur')
        )
      ),

      h('div', { style:{ display:'flex', gap:10, marginTop:22, flexWrap:'wrap' } },
        ...SC.map(s => h('button', { key:s.id, onClick:()=>setSc(s), style:{
          padding:'8px 18px', borderRadius:8, fontSize:11, fontWeight:700,
          letterSpacing:.5, transition:'all .18s',
          border:`1.5px solid ${sc.id===s.id ? s.c : '#1e293b'}`,
          background: sc.id===s.id ? s.c+'18' : '#0f172a',
          color: sc.id===s.id ? s.c : '#64748b'
        } }, (s.id==='S0'?'⚠ ':s.id==='S3'?'★ ':'● ')+s.id))
      )
    ),

    // METRICS
    h('div', { key:'m'+k, className:'fade', style:{ display:'flex', gap:12,
      padding:'20px 32px', flexWrap:'wrap', borderBottom:'1px solid #1e293b' } },
      h(Metric, { icon:'💰', label:'Biaya Produksi', value:'Rp '+sc.kwh.toLocaleString('id-ID'), sub:'per kWh', c:sc.c }),
      h(Metric, { icon:'📉', label:'Loss Rate',      value:(sc.loss*100).toFixed(0)+'%', sub:'rantai pasok', c:sc.c }),
      h(Metric, { icon:'⏱', label:'Payback',        value:sc.payback?sc.payback+' tahun':'N/A', sub:'base case', c:sc.c }),
      h(Metric, { icon:'📈', label:'IRR',            value:sc.irr?sc.irr+'%':'Negatif', sub:'25 tahun', c:sc.c }),
      h(Metric, { icon:'🏭', label:'Total CAPEX',    value:'Rp '+((sc.capex+sc.plant)/1000).toFixed(0)+' M', sub:'pembangkit+infrastruktur', c:sc.c }),
      h(Metric, { icon:'📊', label:'BEP',            value:bep?'Tahun '+bep:'Tidak tercapai', sub:'titik balik', c:sc.c })
    ),

    // TABS NAV
    h('div', { style:{ display:'flex', padding:'0 32px',
      borderBottom:'1px solid #1e293b', overflowX:'auto' } },
      ...TABS.map(t => h('button', { key:t.id, onClick:()=>setTab(t.id), style:{
        padding:'14px 18px', fontSize:12, fontWeight:600, whiteSpace:'nowrap',
        color: tab===t.id ? sc.c : '#475569', background:'none', border:'none',
        borderBottom: tab===t.id ? `2px solid ${sc.c}` : '2px solid transparent',
        marginBottom:-1, transition:'color .15s'
      } }, t.label))
    ),

    // TAB BODY
    h('div', { style:{ padding:'28px 32px' } },
      tab==='individual'  && h(TabInd,  { key:'i'+k, sc }),
      tab==='compare'     && h(TabCmp,  { key:'compare' }),
      tab==='annual'      && h(TabAnn,  { key:'a'+k, sc }),
      tab==='sensitivity' && h(TabSens, { key:'sensitivity' })
    ),

    // FOOTER
    h('div', { style:{ padding:'0 32px' } },
      h('div', { style:{ borderTop:'1px solid #1e293b', paddingTop:16,
        display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:8 } },
        h('span', { style:{ ...S.mono, fontSize:10, color:'#334155' } },
          'Semua angka adalah estimasi akademik — validasi lapangan diperlukan'),
        h('span', { style:{ ...S.mono, fontSize:10, color:'#334155' } },
          'Ref: RUPTL PLN 2025–2034 · Disbun KalTim 2023 · Otorita IKN 2024')
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
